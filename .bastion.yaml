# Bastion reviewers for akari.
#
# Each reviewer is a single-concern agent. The same reviewers run two places:
#   1. Locally, via `bastion review --base main`, so you can loop until green
#      before opening a pull request. Run `bastion validate` to check this file.
#   2. In CI, via .github/workflows/bastion.yml, on every pull request.
#
# Every reviewer pins `backend: codex`, so it runs through the Codex CLI and
# bills against a Codex subscription: yours when you run it locally, and the PR
# author's when it runs in CI (the workflow restores their credential first).
#
# This set was deliberately consolidated from nine reviewers to four after a
# review-churn audit (July 2026). Each reviewer run costs roughly a million
# input tokens regardless of what it finds, and bastion re-runs every triggered
# reviewer after every fix, so the bill is reviewers x passes. The audit found
# that five of the nine reviewers had never produced a blocking finding, that
# two (opengraph-cards and projection-consistency) repeatedly blocked on the
# same finding twice per pass, and that most blocks were edge-state or
# formatting nits rather than reachable defects. The consolidation keeps every
# concern that ever caught a real bug and merges overlapping lanes:
#   - go-correctness merges the old concurrency gate with the load-bearing part
#     of error-handling (dropped errors, panics, hangs). Error wrapping style is
#     a note, never a block.
#   - projection-consistency absorbs token-consistency and opengraph-cards:
#     both were instances of its general rule (two representations of one fact
#     must reconcile), and splitting them meant one drift blocked twice.
#   - hot-path-efficiency merges incremental-efficiency and streaming-memory,
#     which shared triggers and referenced each other's scope.
#   - auth-safety is unchanged: it triggers on one small package and almost
#     never runs, so it costs nothing to keep.
# test-coverage was removed: as an advisor it re-listed 10 to 28 optional
# findings on every pass at 10k+ output tokens a run and never gated anything.
# Coverage judgment belongs to the author and `make test`.
#
# Gate reviewers carry a shared "severity bar": a block halts the author, so it
# is spent only on a defect the change actually introduces or worsens, that is
# reachable on akari's real inputs (JSONL from Claude/Codex/pi at realistic
# sizes) AND real states (values an actual write path produces; a row the
# schema permits but no writer creates is a note, not a block), and that the
# author has not already justified. Anything pre-existing,
# adversarial-input-only, or speculative is reported as a non-blocking note
# instead of failing the gate. auth-safety is the deliberate exception: for
# secrets a regression is dangerous even when unlikely, so it stays strict.
#
# Changing this file changes review policy, so CODEOWNERS protects it (see
# .github/CODEOWNERS) and branch protection requires the aggregate `bastion`
# check before merge.

reviewers:
  - name: go-correctness
    trigger: [cmd/**/*.go, internal/**/*.go]
    mode: gate
    backend: codex
    prompt: |
      Review one concern only: correctness of the changed Go code under
      concurrency and failure. Two families of defect share this lane.

      Concurrency. Reason explicitly about what runs concurrently with what
      before deciding. Block when the changed code can race, leak, deadlock, or
      silently drop work:
        - Shared state read and written from more than one goroutine without
          synchronization (a concurrently written map crashes the process).
        - Goroutines that can leak: no way to stop, blocked forever on a
          channel or lock, or never awaited so a failure vanishes.
        - A context accepted but not honored in a way that can hang shutdown:
          an unbounded or long-blocking operation that ignores cancellation.
          A bounded, terminating scan that merely finishes before noticing
          cancellation is a note, not a block.
        - Unbounded goroutine fan-out with no concurrency or lifetime bound.
        - Channel misuse: send on closed, close from the receive side, a send
          that can park forever under cancellation, a nil-channel operation.
        - Lock discipline: inconsistent ordering, a lock held across a blocking
          call, a sync primitive copied by value.
        - Check-then-act races, including the database form: a read-modify-write
          with no row lock or transaction, so concurrent callers clobber each
          other.

      Failure handling. Block only on failures that lose correctness:
        - An error dropped (assigned to `_` or ignored) where the failure
          matters to correctness or to the caller.
        - A panic used for an ordinary, recoverable failure in server or
          library code.
      Error wrapping and message context (fmt.Errorf with %w, naming the
      operation) are style: raise missing wrapping as a non-blocking note,
      never as a block.

      Severity bar before you block. A block halts the author until they act,
      so spend it only on a defect this change introduces or materially worsens
      AND that can happen on akari's real inputs and real states:
        - Scope to the diff. Do not block on a latent problem in surrounding or
          unchanged code, or a pre-existing pattern this change only moves or
          sits next to. Raise those as non-blocking notes.
        - Weigh likelihood, not bare possibility. akari ingests JSONL emitted
          by Claude, Codex, and pi at realistic sizes. Do not block on inputs
          the system never produces; note them at most.
        - When you cannot show the failure is real and reachable, or the fix
          likely costs more than the risk it removes, pass and leave a note.
        - Credit stated rationale: if a comment or the PR explains why the
          pattern is safe here, evaluate that reasoning and, if it holds, pass.

      For each finding, name the specific accesses that race (or the leak,
      deadlock, or dropped failure) and state the fix. Do not comment on
      naming, formatting, structure, or test coverage. If the changed code is
      sound, pass.

  - name: projection-consistency
    trigger:
      - cmd/**/*.go
      - internal/**/*.go
      - internal/server/web/**/*.templ
      - migrations/**/*.sql
    mode: gate
    backend: codex
    prompt: |
      Review one concern only: drift between multiple representations of the
      same data. Any time the code keeps more than one representation of a fact
      (a denormalized rollup beside the rows it summarizes, a maintained
      counter or facet beside what it counts, a cache, generated column,
      running hash, or cursor beside its source, or two queries that compute
      one figure two ways), nothing in the schema forces them equal, and a
      missed update path or partial rebuild breaks the invariant silently.
      docs/data-aggregation.md writes the token/cost instance out in full.

      Block when the change introduces any of these:
        - A new projection that derives a datum an existing representation
          already holds, at the same scope, with nothing forcing the two equal:
          no shared canonical source and no reconciliation test (the way
          TestProjectsIndexReconcilesWithAnalytics pins the projects index
          against the analytics panel).
        - A change that breaks the fold, trigger, reset, or rebuild keeping a
          derived value equal to its source: an incremental update that folds
          only some fields, a trigger that misses an operation, a reset that
          fails to zero a field, a rebuild that does not reproduce the live
          path, a counter incremented on one path but not decremented on the
          reverse. An aggregate query reading a subset of the columns it should
          is the same bug on the read side.
        - A filter or scope applied to one projection but not its counterpart,
          beyond a gap that is documented and pinned (the occurred_at IS NOT
          NULL gap is pinned by TestUndatedUsageIsTheOnlyRollupAnalyticsGap).

      Two named instances of this rule, previously separate reviewers, are
      yours now:
        - Token classes. akari accounts for four token classes (input, output,
          cache read, cache write). Any operation meant to cover tokens as a
          whole (parse, sum, roll up, persist, reset, delta, price) must carry
          all four; handling three of four is the classic partial fold. A
          headline token or cost total in one web view must equal the sum of
          the rows rendered beside it. Code deliberately and clearly scoped to
          one class is not a violation. The hover breakdown card on token
          figures is a UI convention: flag a new figure that lacks it as a
          non-blocking note, not a block.
        - Open Graph cards. The public pages (/, /u/<username>, /p/<id>,
          /s/<public_id>) each advertise an og:image rendered by the ogimage
          package; the card is a static snapshot of its page. A new public
          content page with no card, a change that silently drops an existing
          card, or a card figure computed from a different base, filter, or
          window than the page's own figure for the same fact is projection
          drift and blocks. The pins to guard: ogimage.DefaultSince/DefaultUntil
          equal the page's default range, and the landing headline/subline are
          one shared constant. Error and reparse stand-in pages carry no card
          on purpose.

      Severity bar before you block. A block halts the author until they act,
      so spend it only on a divergence this change introduces or materially
      worsens, reachable in a state a real write path produces:
        - Scope to the diff. A pre-existing projection this change only moves
          or sits next to is a note.
        - The counterexample must be concrete AND producible: name the two
          representations that drift and the write path that creates the
          diverging state. A row the schema permits but no writer creates
          (fields the code always sets together, a zero time no path stores)
          is a note, not a block. Two renderings of the same underlying value
          that differ only in formatting precision are a note unless a reader
          would be misled about the fact itself.
        - Credit stated rationale: a reconciliation test, a comment, or the PR
          explaining why two figures need not reconcile (a trailing-window
          trend beside a lifetime total, a deliberately approximate cache)
          passes if the reasoning holds.

      Do not comment on layout, naming, error handling, or concurrency. Cite
      file and line, name the two representations that can drift (or the
      broken maintain path), and give the fix: read the canonical source,
      thread every field through the fold, or add the pinning test. If the
      change keeps its projections consistent, pass.

  - name: hot-path-efficiency
    trigger:
      - internal/parser/**/*.go
      - internal/server/parse/**/*.go
      - internal/server/store/**/*.go
      - internal/server/httpapi/ingest.go
      - internal/client/upload/**/*.go
    mode: gate
    backend: codex
    prompt: |
      Review one concern only: the cost model of the ingest and parse path.
      akari's architecture is an append-only source of truth (raw JSONL bytes
      plus the CAS) with disposable derived state refolded from it: when a
      unit's inputs change, the server recomputes that whole unit from its
      source and swaps it atomically. Judge efficiency against that model, not
      against an incremental-update ideal. A whole-unit recompute of a bounded
      unit is the intended shape (it buys determinism and a single write
      path); recomputing is not itself a finding. What this gate exists to
      catch is cost that outgrows its unit: work or memory that scales with
      the corpus, with total history, or with something that has no real
      bound.

      Block when changed code on a per-chunk, per-append, per-request, or
      per-recompute path does any of these:
        - Scales with the corpus to serve one unit's event: a full-table or
          unindexed scan across all sessions, a fleet-wide query, or a pass
          over every unit to find the one that changed. Per-event lookups must
          be keyed or indexed to the units that actually need work.
        - Re-processes total history on the append path itself: re-hashing,
          re-copying, or re-uploading all accumulated raw bytes per append.
          The raw side is the unbounded side: digests resume from saved
          state, cursors advance, appends never rewrite stored values (a blob
          the storage layer detoasts and rewrites per append is this bug).
        - Holds the unbounded side in memory: reading a whole raw transcript,
          blob, or request body into one buffer when a bounded reader can
          stream it in fixed-size pieces. One unit's folded derived rows are
          the bounded side; holding one unit's derived state while writing it
          is the design. Holding MANY units' derived state at once is
          corpus-scale and blocks.
        - Recomputes without a dirtiness trigger: reprocessing a unit whose
          inputs did not change, or fanning N pending events into N identical
          recomputes where a dirty flag or coalesced wake already covers them
          with one. One recompute per dirty transition is expected; redundant
          recomputes with no bound on the redundancy block.
        - Is superlinear inside one pass: a nested loop whose inner pass
          rescans a collection that grows with the outer loop, or re-sorting
          and re-indexing per element.

      Reason about cost as (number of calls) times (work per call), and name
      the quantity each factor scales with. Work per call proportional to one
      bounded unit, triggered once per dirty transition, is the intended
      shape. Work per call proportional to the corpus, or triggered without
      bound for one transition, is what you block.

      Severity bar before you block. A block halts the author until they act,
      so spend it only on cost this change introduces or materially worsens
      AND whose growth occurs on akari's real data:
        - Name which quantity actually grows without bound in a real
          deployment. Sessions stay megabyte-scale: messages are small and
          bulky tool bodies live in the CAS, so a cost bounded by one session
          is a note at most. The corpus (sessions accumulating over history)
          grows without bound, so corpus-scale cost on a hot path blocks.
        - Scope to the diff; do not re-raise a cost the author or a prior PR
          already justified. If a comment or the PR explains why a whole unit
          must be resident or recomputed and the claim holds, pass and say so.
        - This gate protects the server. Client-side extra work (re-reading a
          file it holds, recomputing a digest, encoding twice to save a round
          trip) within bounded memory is acceptable; block client code only
          when a sync scales with total history rather than the appended
          tail.

      Cite file and line, state the growth driver and which quantity it
      scales with, and name the fix. Do not comment on error wording, naming,
      or style. If every changed cost is bounded by its unit and triggered by
      real dirtiness, pass.

  - name: auth-safety
    trigger: [internal/server/auth/**/*.go]
    mode: gate
    backend: codex
    prompt: |
      Review one concern only: the safety of authentication and secret-handling
      code. This package is small but security-critical, so the dangerous change
      is usually a regression that weakens something currently correct.

      Block when the change:
        - Compares secrets, tokens, MACs, or password hashes with a variable-time
          operation (`==`, `bytes.Equal`) instead of crypto/subtle.ConstantTimeCompare
          or hmac.Equal.
        - Logs, wraps into an error message, or otherwise exposes a secret,
          token, password, API key, or full credential.
        - Weakens key derivation or hashing: lowered argon2/bcrypt/scrypt
          parameters, a fast or non-cryptographic hash used for passwords, or a
          shortened salt or key length.
        - Draws security-relevant randomness (tokens, salts, nonces, session ids)
          from a non-cryptographic or predictable source (math/rand) instead of
          crypto/rand.
        - Introduces an auth bypass: a handler that skips the check, a
          default-allow path, an empty or zero token treated as valid, or a
          comparison that returns true on error.
        - Hardcodes a credential or commits one to the repo.

      Cite file and line, name the weakness, and give the fix. Stay strictly on
      auth and secrets; other reviewers own general error handling and
      concurrency. If the auth and secret handling is sound, pass.
