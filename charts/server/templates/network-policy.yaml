{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "akari.name" . }}
  labels:
    {{- include "akari.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "akari.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: {{ .Values.networkPolicy.proxyNamespace }}
          podSelector:
            matchLabels:
              {{- toYaml .Values.networkPolicy.proxyPodLabels | nindent 14 }}
      ports:
        - protocol: TCP
          port: {{ .Values.service.targetPort }}
{{- end }}
