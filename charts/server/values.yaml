fullnameOverride: fg-akari

replicaCount: 1
revisionHistoryLimit: 3
terminationGracePeriodSeconds: 30

image:
  repository: example.invalid/akari
  tag: dev
  pullPolicy: IfNotPresent

runtimeSecretName: fg-akari-runtime

service:
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 1Gi

temporaryStorage:
  sizeLimit: 1Gi

health:
  startup:
    failureThreshold: 30
    periodSeconds: 5
  readiness:
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
  liveness:
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3

networkPolicy:
  enabled: true
  proxyNamespace: applications
  proxyPodLabels:
    app.kubernetes.io/instance: fg-minionforge
