name: CI

# Fast feedback on every push to main and every pull request: formatting, vet,
# and the full test suite. The release workflow separately cross-compiles every
# release target on the same events, so CI here does not duplicate the build
# matrix; it focuses on correctness.

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    services:
      # The store, parse, and web tests skip themselves unless
      # AKARI_TEST_DATABASE_URL is set. Provide a real Postgres so those
      # integration tests actually run in CI instead of silently skipping.
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: akari
          POSTGRES_USER: akari
          POSTGRES_PASSWORD: akari
        ports:
          - "5432:5432"
        options: >-
          --health-cmd "pg_isready -U akari -d akari"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      AKARI_TEST_DATABASE_URL: postgres://akari:akari@localhost:5432/akari?sslmode=disable

    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.6

      - name: Check and build React application
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run check
          bun run build

      - name: Verify committed frontend artifact
        run: git diff --exit-code -- internal/server/frontend/dist

      - name: Generate homepage template
        run: go generate ./...

      - name: Check formatting
        run: |
          # gofmt -l prints files that are not formatted; any output is a failure.
          unformatted="$(gofmt -l .)"
          if [[ -n "$unformatted" ]]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        # The integration tests provision an isolated database per test (see
        # internal/server/storetest), so packages run concurrently at the default
        # parallelism with no clobbering. -race needs CGO, which the ubuntu runner
        # has.
        run: go test -race ./...

  daemon-windows:
    name: Test daemon logging (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test Windows daemon behavior
        run: go test -race ./internal/client/daemon ./cmd/akari
