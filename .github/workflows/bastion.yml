name: bastion

# Agentic code review on every pull request. Reviewers live in .bastion.yaml
# and run through the Codex CLI, billing against the PR author's Codex
# subscription (restored from a per-author secret below). This is the same set
# of reviewers contributors run locally with `bastion review`.
#
# The jssblck/bastion action owns the review: it installs the engine, fetches
# the attestation notes ref (a signed local green replays instead of
# re-executing, since .bastion.yaml sets `attestations: true`), restores the
# branch's prior run so an unchanged reviewer carries its pass instead of
# re-running, reviews with the PR's description and discussion as context,
# uploads the run artifact, posts the report, and only then fails on a block,
# so the comment and check runs land either way.

on:
  pull_request:
    types: [opened, synchronize, reopened]

# `actions: read` lets the action restore the branch's prior run artifact for
# incremental carry.
permissions:
  contents: read
  pull-requests: write
  checks: write
  actions: read

jobs:
  review:
    name: review
    runs-on: ubuntu-latest

    # Fork PRs do not receive repository secrets, so the Codex credential cannot
    # be restored there and the review could only fail. Skip them; the aggregate
    # `bastion` check still has to pass for same-repo PRs.
    if: github.event.pull_request.head.repo.full_name == github.repository

    env:
      # An optional GitHub App gives the PR comment a bot identity instead of the
      # default Actions token. Leave the secrets unset to fall back to GITHUB_TOKEN.
      HAS_BASTION_APP: ${{ secrets.BASTION_APP_ID != '' && secrets.BASTION_APP_PRIVATE_KEY != '' }}
      # Bastion drives Codex, which leaves rollout logs on the runner. When both
      # the akari server URL and an ingest token are configured, the steps at the
      # end of this job push those logs to akari. Leave either unset to skip the
      # sync (for example on a fork, which gets no secrets) without failing.
      HAS_AKARI: ${{ vars.AKARI_SERVER_URL != '' && secrets.AKARI_INGEST_TOKEN != '' }}

    steps:
      - uses: actions/checkout@v7
        with:
          # Reviewers diff against the base branch, so the full history must be
          # present for `origin/<base>` to resolve.
          fetch-depth: 0
          # The PR head, not the synthetic merge commit: attestation replay
          # binds to the head tree the author attested, which a merge commit
          # never matches.
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Install the Codex CLI
        # Bastion shells out to `codex`, so the runner needs it on PATH. Pinned
        # for reproducible reviews; bump deliberately.
        run: npm install -g @openai/codex@0.142.3

      - name: Authenticate Codex as the PR author
        # Each contributor stores their own Codex subscription credential as a
        # CODEX_AUTH_<LOGIN> secret (uppercased GitHub login). Restore the one
        # matching this PR's author so the review bills to them. To onboard a new
        # author, add a case arm here and the matching secret.
        env:
          AUTHOR: ${{ github.event.pull_request.user.login }}
          CODEX_AUTH_JSSBLCK: ${{ secrets.CODEX_AUTH_JSSBLCK }}
        run: |
          set -euo pipefail
          author="$(printf '%s' "$AUTHOR" | tr '[:upper:]' '[:lower:]')"
          case "$author" in
            jssblck) cred="$CODEX_AUTH_JSSBLCK" ;;
            # Dependabot opens PRs as a bot with no Codex subscription of its own,
            # so bill its dependency-bump reviews to the maintainer's credential.
            # The brackets are quoted to match the literal login, not a glob.
            'dependabot[bot]') cred="$CODEX_AUTH_JSSBLCK" ;;
            *)
              echo "::error::No Codex credential mapped for PR author '$AUTHOR'. Add a CODEX_AUTH_<LOGIN> secret and a case arm in .github/workflows/bastion.yml." >&2
              exit 1 ;;
          esac
          if [ -z "$cred" ]; then
            echo "::error::Codex credential for '$AUTHOR' is mapped but its secret is empty." >&2
            exit 1
          fi
          mkdir -p "$HOME/.codex"
          printf '%s' "$cred" > "$HOME/.codex/auth.json"
          chmod 600 "$HOME/.codex/auth.json"

      - id: app-token
        name: Mint a GitHub App token (optional)
        if: ${{ env.HAS_BASTION_APP == 'true' }}
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.BASTION_APP_ID }}
          private-key: ${{ secrets.BASTION_APP_PRIVATE_KEY }}

      - name: Review and report
        uses: jssblck/bastion@v0
        with:
          # Empty when the app is not configured, which falls back to the job token.
          report-token: ${{ steps.app-token.outputs.token }}

      - name: Install the akari client
        # Pull the published client so this CI review's Codex sessions can be
        # synced to akari. Resolve the version with the authenticated gh CLI and
        # pass it as AKARI_VERSION, which skips the installer's anonymous
        # api.github.com lookup of the latest release. That lookup is rate limited
        # and returns 403 on back-to-back runs; pinning the tag avoids it and the
        # release download itself is not rate limited. Best effort, like the sync
        # below: a client that will not install must never fail the review gate.
        # The installer does not touch PATH, so expose its bin dir to later steps.
        if: ${{ always() && env.HAS_AKARI == 'true' }}
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          AKARI_VERSION="$(gh release view --repo jssblck/akari --json tagName -q .tagName)"
          export AKARI_VERSION
          curl -sSfL https://raw.githubusercontent.com/jssblck/akari/main/scripts/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Sync this review's Codex sessions to akari
        # Codex wrote its rollout logs under ~/.codex while Bastion reviewed; push
        # them so every CI review lands in akari's own history, attributed to this
        # repo through the checkout's git remote. Best effort: a sync hiccup must
        # not flip the review verdict, so this step never fails the job. --time-limit 0
        # lifts the default cap since there is only this run's handful of sessions.
        # --finalize treats every session as terminal so a Codex session's trailing
        # turn flushes now: the runner is torn down right after this step, so its idle
        # settle window would never elapse to flush that turn otherwise.
        if: ${{ always() && env.HAS_AKARI == 'true' }}
        continue-on-error: true
        env:
          AKARI_SERVER_URL: ${{ vars.AKARI_SERVER_URL }}
          AKARI_INGEST_TOKEN: ${{ secrets.AKARI_INGEST_TOKEN }}
        run: |
          set -euo pipefail
          akari login --server "$AKARI_SERVER_URL" --token "$AKARI_INGEST_TOKEN"
          akari sync --time-limit 0 --finalize
