name: Deployment CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  helm:
    name: Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Lint and render chart
        shell: bash
        run: |
          set -euo pipefail
          helm lint charts/server \
            --set-string image.repository=example.invalid/akari \
            --set-string image.tag=ci
          helm template fg-akari charts/server \
            --namespace akari \
            --set-string image.repository=example.invalid/akari \
            --set-string image.tag=ci \
            >/dev/null

  image:
    name: Server image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build server image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          build-args: VERSION=ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
