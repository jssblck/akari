services:
  postgres:
    image: postgres:18 # latest major
    environment:
      POSTGRES_DB: akari
      POSTGRES_USER: akari
      POSTGRES_PASSWORD: akari
    volumes:
      # Postgres 18+ wants the mount at /var/lib/postgresql (data lives in a
      # version subdirectory under it), not at /var/lib/postgresql/data.
      - pgdata:/var/lib/postgresql
    ports:
      # Host 55432 avoids colliding with any local postgres on 5432.
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U akari -d akari"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AKARI_DATABASE_URL: postgres://akari:akari@postgres:5432/akari?sslmode=disable
      AKARI_LISTEN: ":8080"
      # Local dev is plain HTTP; do not mark cookies Secure.
      AKARI_COOKIE_INSECURE: "1"
    ports:
      - "8080:8080"

volumes:
  pgdata:
